apiVersion: v1
kind: Secret
metadata:
  name: gitops-repo-credentials
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  # GitOps repository URL ArgoCD should access
  url: https://gitlab.omerlevy03.com/omerlevyk/gitops.git
  type: git
  # Use a dedicated read-only GitLab service account/token
  username: GITLAB_USERNAME
  password: GITLAB_READ_ONLY_TOKEN
